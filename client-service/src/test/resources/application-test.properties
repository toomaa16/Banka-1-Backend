spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.liquibase.enabled=false
# Samo za testove - u produkciji koristiti nasumicnu 256-bitnu vrednost
jwt.secret=test_secret_key_at_least_32_characters_long
banka.security.roles-claim=roles
banka.security.permissions-claim=permissions
banka.security.permit-all=/v3/api-docs/**,/swagger-ui/**
server.port=0
springdoc.server-url=http://localhost:8083
# RabbitMQ test vrednosti
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
rabbitmq.queue=test-notification-queue
rabbitmq.exchange=test-exchange
rabbitmq.routing-key=test.#
